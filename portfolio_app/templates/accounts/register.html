{% extends 'base.html' %}

{% block content %}

<style>

.register-section{
    background:#111827;
    min-height:100vh;
    display:flex;
    align-items:center;
}

.register-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.register-tag{
    color:#00D1FF;
    font-weight:600;
    letter-spacing:2px;
}

.register-title{
    color:white;
    font-size:48px;
    font-weight:700;
}

.register-subtitle{
    color:#9CA3AF;
}

.form-control{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    padding:14px;
}

.form-control:focus{
    background:rgba(255,255,255,0.05);
    color:white;
    border-color:#00D1FF;
    box-shadow:none;
}

.form-label{
    color:white;
}

.register-btn{
    background:linear-gradient(
        90deg,
        #00D1FF,
        #7A5CFF
    );
    border:none;
    color:white;
    padding:14px;
    border-radius:12px;
    font-weight:600;
}

.login-link{
    color:#00D1FF;
    text-decoration:none;
}

.login-link:hover{
    color:#7A5CFF;
}

</style>

<section class="register-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-6">

                <div class="register-card p-5">

                    <div class="text-center mb-4">

                        <span class="register-tag">
                            CREATE ACCOUNT
                        </span>

                        <h1 class="register-title mt-3">
                            Join Us Today
                        </h1>

                        <p class="register-subtitle mt-3">
                            Create your account and start exploring.
                        </p>

                    </div>

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Enter username"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter email"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password1"
                                class="form-control"
                                placeholder="Create password"
                                required
                            >

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input
                                type="password"
                                name="password2"
                                class="form-control"
                                placeholder="Confirm password"
                                required
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn register-btn w-100">

                            Create Account

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <p class="text-secondary">

                            Already have an account?

                            <a
                                href="{% url 'login' %}"
                                class="login-link">

                                Login

                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
