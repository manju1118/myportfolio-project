{% extends 'base.html' %}

{% block content %}

<style>

.wishlist-section{
    background:#0B1020;
    min-height:100vh;
}

.page-title{
    color:white;
    font-size:50px;
    font-weight:700;
}

.wishlist-card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    overflow:hidden;
    transition:.4s;
    height:100%;
}

.wishlist-card:hover{
    transform:translateY(-8px);
    border-color:#00D1FF;
}

.product-image{
    width:100%;
    height:250px;
    object-fit:cover;
}

.product-title{
    color:white;
    font-size:20px;
    font-weight:600;
}

.product-price{
    color:#00D1FF;
    font-size:22px;
    font-weight:700;
}

@media(max-width:768px){

    .page-title{
        font-size:32px;
        text-align:center;
    }

}

</style>

<section class="wishlist-section py-5">

<div class="container">

<h1 class="page-title mb-5">

❤️ My Wishlist

</h1>

<div class="row g-4">

{% for item in wishlist_items %}

<div class="col-md-6 col-lg-4">

<div class="wishlist-card">

{% if item.product.image %}

<img
src="{{ item.product.image.url }}"
class="product-image">

{% endif %}

<div class="p-4">

<h4 class="product-title">

{{ item.product.title }}

</h4>

<p class="product-price">

₹{{ item.product.price }}

</p>

<div class="d-flex gap-2">

<a
href="{% url 'product_detail' item.product.slug %}"
class="btn btn-outline-info flex-fill">

👁 View

</a>

<a
href="{% url 'remove_wishlist' item.id %}"
class="btn btn-danger flex-fill">

🗑 Remove

</a>

</div>

</div>

</div>

</div>

{% empty %}

<div class="col-12">

<div class="alert alert-dark text-center">

No Wishlist Products Yet ❤️

</div>

</div>

{% endfor %}

</div>

</div>

</section>

{% endblock %}
