{% extends 'base.html' %}

{% block content %}

<style>

.password-section{
    background:#0B1020;
    min-height:100vh;
}

.password-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    backdrop-filter:blur(10px);
}

.page-title{
    color:white;
    font-size:50px;
    font-weight:700;
}

.form-label{
    color:white;
}

.form-control{

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    color:white;

}

.form-control:focus{

    background:rgba(255,255,255,0.08);
    color:white;
    border-color:#00D1FF;
    box-shadow:none;

}

.change-btn{

    background:linear-gradient(
        90deg,
        #00D1FF,
        #7A5CFF
    );

    border:none;
    color:white;
    padding:12px 25px;
    border-radius:12px;

}

.help-text{

    color:#9CA3AF;
    font-size:14px;

}

@media(max-width:768px){

    .page-title{

        font-size:34px;
        text-align:center;

    }

}

</style>

<section class="password-section py-5">
    <!-- messages -->
     {% if messages %}

                {% for message in messages %}

                    <div class="alert alert-success alert-dismissible fade show message-alert">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}
    <div class="container">


    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="password-card p-5">

                <h1 class="page-title text-center mb-5">

                    🔒 Change Password

                </h1>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Current Password

                        </label>

                        <input
                        type="password"
                        name="old_password"
                        class="form-control"
                        required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            New Password

                        </label>

                        <input
                        type="password"
                        name="new_password1"
                        class="form-control"
                        required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Confirm New Password

                        </label>

                        <input
                        type="password"
                        name="new_password2"
                        class="form-control"
                        required>

                    </div>

                    {% if form.errors %}

                    <div class="alert alert-danger">

                        {{ form.errors }}

                    </div>

                    {% endif %}

                    <button
                    type="submit"
                    class="btn change-btn w-100">

                        Update Password

                    </button>
                    <a href="{% url 'profile' %}" >
                        <button
                        type="button"
                        class="btn btn-outline-light w-100 mt-3">

                            Back to Profile

                        </button>
                    </a>

                </form>

            </div>

        </div>

    </div>
    ```

    </div>

</section>

{% endblock %}
